name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            quickgrep-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('quickgrep-core/Cargo.toml') }}

      - name: Build quickgrep-core (Rust)
        working-directory: quickgrep-core
        run: cargo build --release

      - name: Test quickgrep-core (Rust)
        working-directory: quickgrep-core
        run: cargo test --release

      - name: Restore
        run: dotnet restore QuickGrep.sln

      - name: Build (Release)
        run: dotnet build QuickGrep.sln -c Release --no-restore

      - name: Test
        run: dotnet test QuickGrep.Tests/QuickGrep.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

  benchmark-smoke:
    runs-on: windows-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Run BenchmarkDotNet smoke
        run: dotnet run -c Release --project QuickGrep.Benchmarks -- --filter "*LiteralSearch*" --job short --launchCount 1 --warmupCount 1 --iterationCount 1
