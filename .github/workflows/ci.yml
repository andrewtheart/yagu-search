name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/yagu-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/yagu-core/Cargo.toml') }}

      - name: Build yagu-core (Rust)
        working-directory: src/yagu-core
        run: cargo build --release

      - name: Test yagu-core (Rust)
        working-directory: src/yagu-core
        run: cargo test --release

      - name: Restore
        run: dotnet restore Yagu.sln

      - name: Build (Release)
        run: dotnet build Yagu.sln -c Release --no-restore

      # Exclude Slow + GPU tests: they need a GPU + local Foundry model (SemanticEvalGoldenTests is
      # tagged both Category=Slow and Category=GPU), or are timing/large-corpus perf regression guards
      # unreliable on shared CI runners. The headed UIAutomation GUI tests (Category=Headed) are NOT
      # filtered out here — they self-detect the CI environment via HeadedTestEnvironment and skip at
      # runtime (GITHUB_ACTIONS/non-interactive), so they auto-run on dev desktops but never in CI.
      # They run on-demand on a dev machine; the BenchmarkDotNet smoke job covers throughput.
      - name: Test
        run: dotnet test tests/Yagu.Tests/Yagu.Tests.csproj -c Release --no-build --filter "Category!=Slow&Category!=GPU" --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

  benchmark-smoke:
    runs-on: windows-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Build the native core so the benchmark exercises the Rust fast path instead of the
      # managed fallback (Yagu.Benchmarks only copies target/release/yagu_core.dll if it exists).
      - name: Build yagu-core (Rust)
        working-directory: src/yagu-core
        run: cargo build --release

      - name: Run BenchmarkDotNet smoke
        run: dotnet run -c Release --project tests/Yagu.Benchmarks -- --filter "*LiteralSearch*" --job short --launchCount 1 --warmupCount 1 --iterationCount 1
