name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            yagu-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('yagu-core/Cargo.toml') }}

      - name: Build yagu-core (Rust)
        working-directory: yagu-core
        run: cargo build --release

      - name: Test yagu-core (Rust)
        working-directory: yagu-core
        run: cargo test --release

      - name: Restore
        run: dotnet restore Yagu.sln

      - name: Build (Release)
        run: dotnet build Yagu.sln -c Release --no-restore

      # Exclude Slow tests: they need a GPU + local Foundry model (SemanticEvalGoldenTests),
      # or are timing/UI-sensitive perf regression guards (ContentSearchPerformanceRegressionTests,
      # MatchNavRegressionTests) that are unreliable on shared CI runners. They run on-demand on a dev
      # machine. The BenchmarkDotNet smoke job below covers throughput separately.
      - name: Test
        run: dotnet test Yagu.Tests/Yagu.Tests.csproj -c Release --no-build --filter "Category!=Slow" --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

  benchmark-smoke:
    runs-on: windows-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Build the native core so the benchmark exercises the Rust fast path instead of the
      # managed fallback (Yagu.Benchmarks only copies target/release/yagu_core.dll if it exists).
      - name: Build yagu-core (Rust)
        working-directory: yagu-core
        run: cargo build --release

      - name: Run BenchmarkDotNet smoke
        run: dotnet run -c Release --project Yagu.Benchmarks -- --filter "*LiteralSearch*" --job short --launchCount 1 --warmupCount 1 --iterationCount 1
