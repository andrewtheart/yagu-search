<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal</title>
<link rel="stylesheet" href="xterm.css" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1e1e1e;
  }
  #terminal {
    position: relative;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    padding: 8px 12px;
    background: #1e1e1e;
  }
  #terminal .xterm {
    width: 100%;
    height: 100%;
  }
  #terminal .xterm .xterm-viewport {
    z-index: 0;
    background-color: #1e1e1e;
  }
  #terminal .xterm .xterm-screen {
    z-index: 2;
  }
  #terminalMenu {
    position: fixed;
    display: none;
    min-width: 188px;
    padding: 6px;
    border: 1px solid #454545;
    border-radius: 6px;
    background: #252526;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    z-index: 20;
  }
  #terminalMenu button {
    display: block;
    width: 100%;
    padding: 7px 10px;
    border: 0;
    border-radius: 4px;
    background: transparent;
    color: #cccccc;
    font: 13px 'Segoe UI', sans-serif;
    text-align: left;
  }
  #terminalMenu button:hover,
  #terminalMenu button:focus {
    outline: none;
    background: #37373d;
    color: #ffffff;
  }
  #terminalMenu button:disabled {
    color: #6b6b6b;
    background: transparent;
  }
  #terminalMenu .terminalMenuSeparator {
    height: 1px;
    margin: 5px 6px;
    background: #454545;
  }
</style>
</head>
<body>
<div id="terminal"></div>
<div id="terminalMenu" role="menu" aria-label="Terminal menu">
  <button id="terminalCopy" type="button" role="menuitem">Copy</button>
  <button id="terminalPaste" type="button" role="menuitem">Paste</button>
  <button id="terminalCut" type="button" role="menuitem">Cut</button>
  <button id="terminalSelectAll" type="button" role="menuitem">Select all</button>
  <div class="terminalMenuSeparator" role="separator"></div>
  <button id="terminalClear" type="button" role="menuitem">Clear</button>
  <button id="resetTerminalSession" type="button" role="menuitem">Reset terminal session</button>
</div>
<script src="xterm.js"></script>
<script src="addon-fit.js"></script>
<script>
(function() {
  function postHostMessage(message) {
    try {
      window.chrome.webview.postMessage(JSON.stringify(message));
    } catch (_) {
    }
  }

  function logToHost(level, message) {
    postHostMessage({ type: 'hostLog', level: level, message: message });
  }

  window.addEventListener('error', function(event) {
    logToHost('error', 'Terminal page script error: ' + event.message + ' at ' + event.filename + ':' + event.lineno + ':' + event.colno);
  });

  window.addEventListener('unhandledrejection', function(event) {
    logToHost('error', 'Terminal page unhandled rejection: ' + (event.reason && event.reason.message ? event.reason.message : event.reason));
  });

  const terminalElement = document.getElementById('terminal');
  const terminalMenu = document.getElementById('terminalMenu');
  const resetTerminalSessionButton = document.getElementById('resetTerminalSession');
  const terminalCopyButton = document.getElementById('terminalCopy');
  const terminalPasteButton = document.getElementById('terminalPaste');
  const terminalCutButton = document.getElementById('terminalCut');
  const terminalSelectAllButton = document.getElementById('terminalSelectAll');
  const terminalClearButton = document.getElementById('terminalClear');
  terminalElement.tabIndex = 0;
  let receivedOutputCount = 0;
  let sentFirstInputLog = false;
  let sentReady = false;
  let inputBuffer = '';
  let inputCursor = 0;
  let renderedInputLength = 0;
  let renderedCursorIndex = 0;
  let commandHistory = [];
  let historyIndex = -1;
  let historyDraft = '';
  let completionRequestId = 0;
  let latestCompletionRequestId = 0;
  let shellCommandActive = false;
  let lastPromptText = '';

  function showTerminalStartupFailure(error) {
    terminalElement.textContent = 'Terminal failed to initialize. Check yagu.log for details.';
    terminalElement.style.color = '#f14c4c';
    terminalElement.style.font = "13px 'Segoe UI', sans-serif";
    terminalElement.style.padding = '12px';
    logToHost('error', 'Terminal page failed to initialize: ' + (error && error.message ? error.message : error));
  }

  try {
  if (typeof Terminal === 'undefined')
    throw new Error('xterm.js did not load');

  if (typeof FitAddon === 'undefined' || typeof FitAddon.FitAddon !== 'function')
    throw new Error('xterm fit addon did not load');

  const term = new Terminal({
    cursorBlink: true,
    fontSize: 13,
    fontFamily: "'Cascadia Code', 'Consolas', monospace",
    theme: {
      background: '#1e1e1e',
      foreground: '#cccccc',
      cursor: '#ffffff',
      selectionBackground: '#264f78',
      black: '#000000',
      red: '#cd3131',
      green: '#0dbc79',
      yellow: '#e5e510',
      blue: '#2472c8',
      magenta: '#bc3fbc',
      cyan: '#11a8cd',
      white: '#e5e5e5',
      brightBlack: '#666666',
      brightRed: '#f14c4c',
      brightGreen: '#23d18b',
      brightYellow: '#f5f543',
      brightBlue: '#3b8eea',
      brightMagenta: '#d670d6',
      brightCyan: '#29b8db',
      brightWhite: '#ffffff'
    }
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(terminalElement);

  function safeFit() {
    try {
      fitAddon.fit();
    } catch (error) {
      logToHost('warning', 'Terminal fit failed: ' + (error && error.message ? error.message : error));
    }
  }

  function terminalHasMeasuredSize() {
    return terminalElement.clientWidth > 0 &&
      terminalElement.clientHeight > 0 &&
      term.cols > 0 &&
      term.rows > 0;
  }

  function signalReadyWhenMeasured(attempt) {
    safeFit();

    if (terminalHasMeasuredSize() || attempt >= 40) {
      if (!sentReady) {
        sentReady = true;
        logToHost('info', 'Terminal page measured: width=' + terminalElement.clientWidth + ', height=' + terminalElement.clientHeight + ', cols=' + term.cols + ', rows=' + term.rows);
        postHostMessage({ type: 'ready' });
      }

      return;
    }

    window.setTimeout(function() { signalReadyWhenMeasured(attempt + 1); }, 50);
  }

  window.requestAnimationFrame(function() {
    signalReadyWhenMeasured(0);
  });

  function hideTerminalMenu() {
    terminalMenu.style.display = 'none';
  }

  function normalizeHostMessage(data) {
    if (typeof data !== 'string')
      return data;

    try {
      return JSON.parse(data);
    } catch (error) {
      logToHost('warning', 'Terminal page received non-JSON host message string: ' + data);
      return null;
    }
  }

  function refreshTerminalRows() {
    try {
      term.refresh(0, term.rows - 1);
    } catch (error) {
      logToHost('warning', 'Terminal refresh failed: ' + (error && error.message ? error.message : error));
    }
  }

  function scheduleInitialTerminalPaintRefresh() {
    window.setTimeout(refreshTerminalRows, 50);
    window.setTimeout(refreshTerminalRows, 150);
  }

  function isTerminalFocusReport(data) {
    return data === '\x1b[I' || data === '\x1b[O';
  }

  function sendTerminalInput(data, echoInput) {
    hideTerminalMenu();
    if (isTerminalFocusReport(data))
      return;
    if (!sentFirstInputLog) {
      sentFirstInputLog = true;
      logToHost('info', 'Terminal page sent first input: chars=' + data.length);
    }
    postHostMessage({ type: 'input', data: data, echoInput: echoInput !== false });
  }

  function moveRenderedCursorRight(count) {
    if (count <= 0)
      return;

    term.write('\x1b[' + count + 'C');
    renderedCursorIndex += count;
  }

  function moveRenderedCursorLeft(count) {
    if (count <= 0)
      return;

    term.write('\b'.repeat(count));
    renderedCursorIndex = Math.max(0, renderedCursorIndex - count);
  }

  function moveRenderedCursorToEnd() {
    moveRenderedCursorRight(renderedInputLength - renderedCursorIndex);
  }

  function clearRenderedInput() {
    if (renderedInputLength <= 0)
      return;

    moveRenderedCursorToEnd();
    var backspaces = '\b'.repeat(renderedInputLength);
    var spaces = ' '.repeat(renderedInputLength);
    term.write(backspaces + spaces + backspaces);
    renderedInputLength = 0;
    renderedCursorIndex = 0;
  }

  function renderInputLine() {
    clearRenderedInput();
    if (inputBuffer.length > 0) {
      term.write(inputBuffer);
      renderedInputLength = inputBuffer.length;
      renderedCursorIndex = inputBuffer.length;
    }

    moveRenderedCursorLeft(inputBuffer.length - inputCursor);
    renderedCursorIndex = inputCursor;
  }

  function setInputBuffer(text, cursor) {
    inputBuffer = text || '';
    inputCursor = Math.max(0, Math.min(cursor ?? inputBuffer.length, inputBuffer.length));
    renderInputLine();
  }

  function clearInputState() {
    inputBuffer = '';
    inputCursor = 0;
    renderedInputLength = 0;
    renderedCursorIndex = 0;
    historyIndex = -1;
    historyDraft = '';
  }

  function markShellIdleIfPromptVisible() {
    var promptText = getCurrentPromptText();
    rememberPromptText(promptText);
  }

  function insertInputText(text) {
    if (!text)
      return;

    var before = inputBuffer.slice(0, inputCursor);
    var after = inputBuffer.slice(inputCursor);
    inputBuffer = before + text + after;
    inputCursor += text.length;

    if (after.length === 0) {
      term.write(text);
      renderedInputLength += text.length;
      renderedCursorIndex += text.length;
    } else {
      renderInputLine();
    }
  }

  function backspaceInput() {
    if (inputCursor <= 0)
      return;

    var removedAtEnd = inputCursor === inputBuffer.length;
    inputBuffer = inputBuffer.slice(0, inputCursor - 1) + inputBuffer.slice(inputCursor);
    inputCursor--;

    if (removedAtEnd) {
      term.write('\b \b');
      renderedInputLength = Math.max(0, renderedInputLength - 1);
      renderedCursorIndex = Math.max(0, renderedCursorIndex - 1);
    } else {
      renderInputLine();
    }
  }

  function deleteInput() {
    if (inputCursor >= inputBuffer.length)
      return;

    inputBuffer = inputBuffer.slice(0, inputCursor) + inputBuffer.slice(inputCursor + 1);
    renderInputLine();
  }

  function moveInputCursor(offset) {
    var nextCursor = Math.max(0, Math.min(inputCursor + offset, inputBuffer.length));
    var delta = nextCursor - inputCursor;
    if (delta > 0)
      moveRenderedCursorRight(delta);
    else if (delta < 0)
      moveRenderedCursorLeft(-delta);
    inputCursor = nextCursor;
    renderedCursorIndex = inputCursor;
  }

  function pushHistory(line) {
    if (!line || !line.trim())
      return;

    if (commandHistory.length === 0 || commandHistory[commandHistory.length - 1] !== line)
      commandHistory.push(line);
    if (commandHistory.length > 100)
      commandHistory.shift();
  }

  function recallHistory(direction) {
    if (commandHistory.length === 0)
      return;

    if (historyIndex === -1) {
      historyDraft = inputBuffer;
      historyIndex = commandHistory.length;
    }

    historyIndex = Math.max(0, Math.min(historyIndex + direction, commandHistory.length));
    if (historyIndex === commandHistory.length)
      setInputBuffer(historyDraft, historyDraft.length);
    else
      setInputBuffer(commandHistory[historyIndex], commandHistory[historyIndex].length);
  }

  function isClearCommand(line) {
    return line.trim().toLowerCase() === 'cls';
  }

  function requestInputCompletion() {
    var requestId = ++completionRequestId;
    latestCompletionRequestId = requestId;
    postHostMessage({
      type: 'completeInput',
      requestId: requestId,
      input: inputBuffer,
      cursor: inputCursor,
      promptText: getCurrentPromptText()
    });
  }

  function replaceInputRange(start, length, text) {
    start = Math.max(0, Math.min(start || 0, inputBuffer.length));
    length = Math.max(0, Math.min(length || 0, inputBuffer.length - start));
    text = text || '';
    var next = inputBuffer.slice(0, start) + text + inputBuffer.slice(start + length);
    setInputBuffer(next, start + text.length);
  }

  function formatCompletionSuggestions(suggestions) {
    var values = (suggestions || []).slice(0, 80);
    if (values.length === 0)
      return '';

    var longest = values.reduce(function(max, value) { return Math.max(max, value.length); }, 0);
    var columnWidth = Math.min(44, Math.max(14, longest + 2));
    var columns = Math.max(1, Math.floor((term.cols || 80) / columnWidth));
    var lines = [];
    for (var i = 0; i < values.length; i += columns) {
      var line = [];
      for (var c = 0; c < columns && i + c < values.length; c++) {
        var value = values[i + c];
        line.push(c === columns - 1 ? value : value.padEnd(columnWidth, ' '));
      }
      lines.push(line.join('').trimEnd());
    }
    return lines.join('\r\n');
  }

  function showCompletionSuggestions(suggestions) {
    var formatted = formatCompletionSuggestions(suggestions);
    if (!formatted)
      return;

    var promptText = getCurrentPromptText();
    clearRenderedInput();
    term.write('\r\n' + formatted + '\r\n');
    if (promptText)
      term.write(formatPromptForInput(promptText));
    renderInputLine();
    refreshTerminalRows();
  }

  function applyCompletionResult(result) {
    if (!result || result.requestId !== latestCompletionRequestId)
      return;

    if (!result.hasMatches) {
      term.write('\x07');
      return;
    }

    if (typeof result.replacementStart === 'number' && typeof result.replacementLength === 'number')
      replaceInputRange(result.replacementStart, result.replacementLength, result.replacementText || '');

    if (result.suggestions && result.suggestions.length > 1)
      showCompletionSuggestions(result.suggestions);
  }

  function getCurrentPromptText() {
    var activeBuffer = term && term.buffer ? term.buffer.active : null;
    if (!activeBuffer || typeof activeBuffer.getLine !== 'function')
      return '';

    var line = activeBuffer.getLine(activeBuffer.baseY + activeBuffer.cursorY);
    var text = line && typeof line.translateToString === 'function'
      ? line.translateToString(true)
      : '';
    return inputBuffer && text.endsWith(inputBuffer)
      ? text.slice(0, text.length - inputBuffer.length)
      : text;
  }

  function looksLikePromptText(text) {
    return /(?:^|[\s\S]*\r?\n)?[A-Za-z]:\\[^\r\n]*>$/.test(text)
      || /^[^\r\n>]+>$/.test(text);
  }

  function stripTerminalControlSequences(text) {
    return (text || '')
      .replace(/\x1b\][^\x07]*(?:\x07|\x1b\\)/g, '')
      .replace(/\x1b\[[0-?]*[ -/]*[@-~]/g, '');
  }

  function rememberPromptText(text) {
    if (!text || !looksLikePromptText(text))
      return false;

    lastPromptText = text;
    shellCommandActive = false;
    return true;
  }

  function rememberPromptFromOutput(text) {
    var normalized = stripTerminalControlSequences(text).replace(/\r/g, '\n');
    var lines = normalized.split('\n');
    for (var i = lines.length - 1; i >= 0; i--) {
      var candidate = lines[i].trimEnd();
      if (rememberPromptText(candidate))
        return;
    }
  }

  function formatPromptForInput(promptText) {
    if (!promptText)
      return '';

    return /\s$/.test(promptText) ? promptText : promptText + ' ';
  }

  function clearTerminalSurface(promptText) {
    term.write('\x1b[2J\x1b[3J\x1b[H');
    if (promptText)
      term.write(formatPromptForInput(promptText));
    refreshTerminalRows();
  }

  function submitInputLine() {
    var line = inputBuffer;
    pushHistory(line);

    if (isClearCommand(line)) {
      var promptText = getCurrentPromptText();
      clearRenderedInput();
      clearInputState();
      clearTerminalSurface(promptText);
      return;
    }

    clearInputState();
    term.write('\r\n');
    shellCommandActive = true;
    sendTerminalInput(line + '\r', false);
  }

  function insertPastedText(text) {
    if (!text)
      return;

    var normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    var lines = normalized.split('\n');
    for (var i = 0; i < lines.length; i++) {
      if (lines[i].length > 0)
        insertInputText(lines[i]);
      if (i < lines.length - 1)
        submitInputLine();
    }
  }

  function cancelInputLine() {
    var promptText = getCurrentPromptText();
    var shouldRedrawPrompt = rememberPromptText(promptText);
    if (!shouldRedrawPrompt && !shellCommandActive && lastPromptText.length > 0) {
      promptText = lastPromptText;
      shouldRedrawPrompt = true;
    }

    if (!shellCommandActive) {
      moveRenderedCursorToEnd();
      term.write('^C\r\n');
      clearInputState();
      if (shouldRedrawPrompt)
        term.write(formatPromptForInput(promptText));
      refreshTerminalRows();
      return;
    }

    clearRenderedInput();
    clearInputState();
    term.write('^C\r\n');
    if (shouldRedrawPrompt)
      term.write(formatPromptForInput(promptText));
    postHostMessage({ type: 'cancelInput' });
  }

  // WebView2 frequently fails to deliver printable keystrokes to xterm's hidden
  // textarea, so every key is translated here and applied to the page-side prompt
  // editor. The host shell only receives submitted lines.
  function translateKeyEventToInput(event) {
    if (event.altKey || event.metaKey || event.ctrlKey)
      return null;

    switch (event.key) {
      case 'Backspace': return { kind: 'backspace' };
      case 'Tab': return { kind: 'completion' };
      case 'ArrowUp': return { kind: 'history', direction: -1 };
      case 'ArrowDown': return { kind: 'history', direction: 1 };
      case 'ArrowRight': return { kind: 'move', offset: 1 };
      case 'ArrowLeft': return { kind: 'move', offset: -1 };
      case 'Home': return { kind: 'home' };
      case 'End': return { kind: 'end' };
      case 'Delete': return { kind: 'delete' };
      default:
        return event.key.length === 1 ? { kind: 'insert', text: event.key } : null;
    }
  }

  function handleTranslatedInput(input) {
    switch (input.kind) {
      case 'insert':
        insertInputText(input.text);
        break;
      case 'backspace':
        backspaceInput();
        break;
      case 'delete':
        deleteInput();
        break;
      case 'move':
        moveInputCursor(input.offset);
        break;
      case 'home':
        moveInputCursor(-inputCursor);
        break;
      case 'end':
        moveInputCursor(inputBuffer.length - inputCursor);
        break;
      case 'history':
        recallHistory(input.direction);
        break;
      case 'completion':
        requestInputCompletion();
        break;
    }
  }

  function forwardEnterKey(event) {
    if (event.key !== 'Enter' || event.altKey || event.ctrlKey || event.metaKey)
      return false;

    event.preventDefault();
    event.stopPropagation();
    submitInputLine();
    return true;
  }

  function showTerminalMenu(event) {
    event.preventDefault();
    var hasSelection = term.hasSelection();
    terminalCopyButton.disabled = !hasSelection;
    terminalCutButton.disabled = !hasSelection;
    const menuWidth = terminalMenu.offsetWidth || 188;
    const menuHeight = terminalMenu.offsetHeight || 34;
    const x = Math.min(event.clientX, window.innerWidth - menuWidth - 4);
    const y = Math.min(event.clientY, window.innerHeight - menuHeight - 4);
    terminalMenu.style.left = Math.max(4, x) + 'px';
    terminalMenu.style.top = Math.max(4, y) + 'px';
    terminalMenu.style.display = 'block';
    terminalPasteButton.focus({ preventScroll: true });
  }

  terminalElement.addEventListener('contextmenu', showTerminalMenu);
  function focusTerminal() {
    try {
      terminalElement.focus({ preventScroll: true });
    } catch (_) {
      terminalElement.focus();
    }
    term.focus();
  }

  terminalElement.addEventListener('pointerdown', focusTerminal);
  terminalElement.addEventListener('click', focusTerminal);
  window.addEventListener('focus', focusTerminal);

  // All key handling happens in the window-level capture listener below, so xterm
  // must never natively process keys (returning false suppresses its own input).
  term.attachCustomKeyEventHandler(function() {
    return false;
  });

  function copyTerminalSelection() {
    var selection = term.getSelection();
    if (selection)
      postHostMessage({ type: 'copyText', text: selection });
    return selection;
  }

  terminalCopyButton.addEventListener('click', function() {
    hideTerminalMenu();
    copyTerminalSelection();
    term.focus();
  });

  terminalPasteButton.addEventListener('click', function() {
    hideTerminalMenu();
    postHostMessage({ type: 'requestPaste' });
    term.focus();
  });

  terminalCutButton.addEventListener('click', function() {
    hideTerminalMenu();
    if (copyTerminalSelection())
      term.clearSelection();
    term.focus();
  });

  terminalSelectAllButton.addEventListener('click', function() {
    hideTerminalMenu();
    term.selectAll();
    term.focus();
  });

  terminalClearButton.addEventListener('click', function() {
    hideTerminalMenu();
    var promptText = getCurrentPromptText();
    clearRenderedInput();
    clearInputState();
    clearTerminalSurface(promptText);
    term.focus();
  });

  resetTerminalSessionButton.addEventListener('click', function() {
    hideTerminalMenu();
    term.reset();
    clearInputState();
    shellCommandActive = false;
    postHostMessage({ type: 'resetTerminal' });
    term.focus();
  });

  document.addEventListener('pointerdown', function(event) {
    if (!terminalMenu.contains(event.target))
      hideTerminalMenu();
  });

  // Send user input to C# host
  term.onData(function(data) {
    insertPastedText(data);
  });

  // Send resize events to C# host
  term.onResize(function(size) {
    postHostMessage({ type: 'resize', cols: size.cols, rows: size.rows });
  });

  // Receive output from C# host
  window.chrome.webview.addEventListener('message', function(event) {
    var msg = normalizeHostMessage(event.data);
    if (msg && msg.type === 'output') {
      var firstOutput = receivedOutputCount === 0;
      rememberPromptFromOutput(msg.data || '');
      if (firstOutput) {
        safeFit();
        scheduleInitialTerminalPaintRefresh();
        logToHost('info', 'Terminal page received first output: chars=' + (msg.data ? msg.data.length : 0));
      }
      receivedOutputCount++;

      if (firstOutput && typeof term.writeSync === 'function') {
        term.writeSync(msg.data || '');
        refreshTerminalRows();
        markShellIdleIfPromptVisible();
      } else {
        term.write(msg.data || '', function() {
          refreshTerminalRows();
          markShellIdleIfPromptVisible();
        });
      }
    } else if (msg && msg.type === 'clear') {
      term.clear();
    } else if (msg && msg.type === 'focus') {
      focusTerminal();
    } else if (msg && msg.type === 'pasteText') {
      insertPastedText(msg.text || '');
    } else if (msg && msg.type === 'completionResult') {
      applyCompletionResult(msg);
    }
  });

  // WebView2 owns keyboard focus while the terminal is active, so all input is
  // captured here and forwarded to the host shell rather than via xterm's textarea.
  window.addEventListener('keydown', function(event) {
    if (event.key === 'F1') {
      event.preventDefault();
      event.stopPropagation();
      postHostMessage({ type: 'openHelp' });
      return;
    }

    if (event.key === 'Escape' && terminalMenu.style.display === 'block') {
      event.preventDefault();
      event.stopPropagation();
      hideTerminalMenu();
      return;
    }

    if (event.ctrlKey && !event.altKey && !event.metaKey) {
      var key = event.key.length === 1 ? event.key.toLowerCase() : event.key;
      if (key === 'c') {
        event.preventDefault();
        event.stopPropagation();
        if (term.hasSelection())
          copyTerminalSelection();
        else
          cancelInputLine();
        return;
      }

      if (key === 'a') {
        event.preventDefault();
        event.stopPropagation();
        term.selectAll();
        return;
      }

      if (key === 'v') {
        event.preventDefault();
        event.stopPropagation();
        postHostMessage({ type: 'requestPaste' });
        return;
      }
    }

    if (forwardEnterKey(event))
      return;

    var input = translateKeyEventToInput(event);
    if (input !== null) {
      event.preventDefault();
      event.stopPropagation();
      handleTranslatedInput(input);
    }
  }, true);

  // Ctrl+V / context-menu paste: insert clipboard text into the page-side prompt editor.
  document.addEventListener('paste', function(event) {
    var text = event.clipboardData ? event.clipboardData.getData('text') : '';
    if (text) {
      event.preventDefault();
      event.stopPropagation();
      insertPastedText(text);
    }
  }, true);

  // Handle window resize
  window.addEventListener('resize', function() {
    safeFit();
  });

  } catch (error) {
    showTerminalStartupFailure(error);
  }
})();
</script>
</body>
</html>
