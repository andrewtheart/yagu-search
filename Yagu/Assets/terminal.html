<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal</title>
<link rel="stylesheet" href="xterm.css" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1e1e1e;
  }
  #terminal {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<div id="terminal"></div>
<script src="xterm.js"></script>
<script src="addon-fit.js"></script>
<script>
(function() {
  const term = new Terminal({
    cursorBlink: true,
    fontSize: 13,
    fontFamily: "'Cascadia Code', 'Consolas', monospace",
    theme: {
      background: '#1e1e1e',
      foreground: '#cccccc',
      cursor: '#ffffff',
      selectionBackground: '#264f78',
      black: '#000000',
      red: '#cd3131',
      green: '#0dbc79',
      yellow: '#e5e510',
      blue: '#2472c8',
      magenta: '#bc3fbc',
      cyan: '#11a8cd',
      white: '#e5e5e5',
      brightBlack: '#666666',
      brightRed: '#f14c4c',
      brightGreen: '#23d18b',
      brightYellow: '#f5f543',
      brightBlue: '#3b8eea',
      brightMagenta: '#d670d6',
      brightCyan: '#29b8db',
      brightWhite: '#ffffff'
    }
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  // Send user input to C# host
  term.onData(function(data) {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'input', data: data }));
  });

  // Send resize events to C# host
  term.onResize(function(size) {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows }));
  });

  // Receive output from C# host
  window.chrome.webview.addEventListener('message', function(event) {
    var msg = event.data;
    if (msg && msg.type === 'output') {
      term.write(msg.data);
    } else if (msg && msg.type === 'clear') {
      term.clear();
    }
  });

  // Handle window resize
  window.addEventListener('resize', function() {
    fitAddon.fit();
  });

  // Signal ready
  window.chrome.webview.postMessage(JSON.stringify({ type: 'ready' }));
})();
</script>
</body>
</html>
