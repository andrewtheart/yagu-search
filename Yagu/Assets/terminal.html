<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal</title>
<link rel="stylesheet" href="xterm.css" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1e1e1e;
  }
  #terminal {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    padding: 8px 12px;
    background: #1e1e1e;
  }
  #terminalMenu {
    position: fixed;
    display: none;
    min-width: 188px;
    padding: 6px;
    border: 1px solid #454545;
    border-radius: 6px;
    background: #252526;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    z-index: 20;
  }
  #terminalMenu button {
    display: block;
    width: 100%;
    padding: 7px 10px;
    border: 0;
    border-radius: 4px;
    background: transparent;
    color: #cccccc;
    font: 13px 'Segoe UI', sans-serif;
    text-align: left;
  }
  #terminalMenu button:hover,
  #terminalMenu button:focus {
    outline: none;
    background: #37373d;
    color: #ffffff;
  }
</style>
</head>
<body>
<div id="terminal"></div>
<div id="terminalMenu" role="menu" aria-label="Terminal menu">
  <button id="resetTerminalSession" type="button" role="menuitem">Reset terminal session</button>
</div>
<script src="xterm.js"></script>
<script src="addon-fit.js"></script>
<script>
(function() {
  const terminalElement = document.getElementById('terminal');
  const terminalMenu = document.getElementById('terminalMenu');
  const resetTerminalSessionButton = document.getElementById('resetTerminalSession');

  const term = new Terminal({
    cursorBlink: true,
    fontSize: 13,
    fontFamily: "'Cascadia Code', 'Consolas', monospace",
    theme: {
      background: '#1e1e1e',
      foreground: '#cccccc',
      cursor: '#ffffff',
      selectionBackground: '#264f78',
      black: '#000000',
      red: '#cd3131',
      green: '#0dbc79',
      yellow: '#e5e510',
      blue: '#2472c8',
      magenta: '#bc3fbc',
      cyan: '#11a8cd',
      white: '#e5e5e5',
      brightBlack: '#666666',
      brightRed: '#f14c4c',
      brightGreen: '#23d18b',
      brightYellow: '#f5f543',
      brightBlue: '#3b8eea',
      brightMagenta: '#d670d6',
      brightCyan: '#29b8db',
      brightWhite: '#ffffff'
    }
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(terminalElement);
  fitAddon.fit();

  function hideTerminalMenu() {
    terminalMenu.style.display = 'none';
  }

  function showTerminalMenu(event) {
    event.preventDefault();
    const menuWidth = terminalMenu.offsetWidth || 188;
    const menuHeight = terminalMenu.offsetHeight || 34;
    const x = Math.min(event.clientX, window.innerWidth - menuWidth - 4);
    const y = Math.min(event.clientY, window.innerHeight - menuHeight - 4);
    terminalMenu.style.left = Math.max(4, x) + 'px';
    terminalMenu.style.top = Math.max(4, y) + 'px';
    terminalMenu.style.display = 'block';
    resetTerminalSessionButton.focus({ preventScroll: true });
  }

  terminalElement.addEventListener('contextmenu', showTerminalMenu);

  resetTerminalSessionButton.addEventListener('click', function() {
    hideTerminalMenu();
    term.reset();
    window.chrome.webview.postMessage(JSON.stringify({ type: 'resetTerminal' }));
    term.focus();
  });

  document.addEventListener('pointerdown', function(event) {
    if (!terminalMenu.contains(event.target))
      hideTerminalMenu();
  });

  // Send user input to C# host
  term.onData(function(data) {
    hideTerminalMenu();
    window.chrome.webview.postMessage(JSON.stringify({ type: 'input', data: data }));
  });

  // Send resize events to C# host
  term.onResize(function(size) {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows }));
  });

  // Receive output from C# host
  window.chrome.webview.addEventListener('message', function(event) {
    var msg = event.data;
    if (msg && msg.type === 'output') {
      term.write(msg.data);
    } else if (msg && msg.type === 'clear') {
      term.clear();
    } else if (msg && msg.type === 'focus') {
      term.focus();
    }
  });

  // WebView2 owns keyboard focus while the terminal is active, so forward F1 to the host.
  window.addEventListener('keydown', function(event) {
    if (event.key === 'F1') {
      event.preventDefault();
      event.stopPropagation();
      window.chrome.webview.postMessage(JSON.stringify({ type: 'openHelp' }));
    } else if (event.key === 'Escape') {
      hideTerminalMenu();
    }
  }, true);

  // Handle window resize
  window.addEventListener('resize', function() {
    fitAddon.fit();
  });

  // Signal ready
  window.chrome.webview.postMessage(JSON.stringify({ type: 'ready' }));
})();
</script>
</body>
</html>
